[workspace]
authors = ["Damien GUESDON <kisai.dg.slu@gmail.com>"]
channels = ["conda-forge", "pypi"]
name = "chess_master"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
start = "python -m api.main"
test = "pytest tests/"
lint = "ruff check ."
format = "black ."
typecheck = "mypy agent/ api/ rag/"
install-angular = "npm install -g @angular/cli"
create-angular-app = "ng new frontend-angular --skip-git --style=css --routing=false"
start-angular = "cd frontend-angular && ng serve"
build-angular = "cd frontend-angular && ng build"

[dependencies]
python = ">=3.10"
nodejs = "18"  # Pour Angular 17

[pypi-dependencies]
fastapi = "*"
uvicorn = "*"
pydantic = "*"
langchain-core = "*"
langgraph = "*"
langchain-openai = "*"
pymilvus = "*"
pymongo = "*"
requests = "*"
stockfish = "*"
pytest = "*"
ruff = "*"
black = "*"
mypy = "*"
