[workspace]
authors = ["Damien GUESDON <kisai.dg.slu@gmail.com>"]
channels = ["conda-forge", "pypi"]
name = "chess_master"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
start = "python -m api.main"
test = "pytest tests/"
lint = "ruff check ."
format = "black ."
typecheck = "mypy agent/ api/ rag/"
install-angular = "npm install -g @angular/cli"
create-angular-app = "ng new frontend-angular --skip-git --style=css --routing=false"
start-angular = "cd frontend-angular && ng serve"
build-angular = "cd frontend-angular && ng build"
docker-up = "docker compose up --build"
docker-down = "docker compose down"
demo = "docker-compose up --build -d && echo 'Frontend: http://localhost:4201 - API: http://localhost:8000'"

[dependencies]
python = ">=3.10"
nodejs = ">=25.8.2,<25.9"  # Version disponible dans conda-forge
docker-compose = "*"  # Pour la démo P13
podman = ">=5.8.1,<6"
podman-compose = ">=1.5.0,<2"
jupyterlab = ">=4.5.6,<5"

[pypi-dependencies]
fastapi = "*"
uvicorn = "*"
pydantic = "*"
langchain-core = "*"
langgraph = "*"
langchain-mistralai = "*"
pymilvus = "*"
pymongo = "*"
requests = "*"
stockfish = "*"
google-api-python-client = "*"
pytest = "*"
ruff = "*"
black = "*"
mypy = "*"
